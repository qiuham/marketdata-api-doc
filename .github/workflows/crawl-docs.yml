name: Crawl Docs

"on":
  workflow_dispatch:
    inputs:
      product:
        description: Product to crawl
        required: true
        type: choice
        options:
          - zhongtai-xtp
          - zhongtai-xtppro
          - binance
          - bybit
          - coinbase
          - gateio
          - hyperliquid
          - kraken
          - okx
          - all
      limit:
        description: Optional page limit for test runs, for example 3
        required: false
        default: ""
        type: string
      commit_changes:
        description: Commit and push docs changes
        required: true
        default: true
        type: boolean
  schedule:
    # Daily full refresh: 02:20 Asia/Shanghai (18:20 UTC).
    - cron: "20 18 * * *"

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: crawl-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest branch
        run: git pull --ff-only origin "${GITHUB_REF_NAME:-main}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install

      - name: Resolve product
        id: product
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PRODUCT: ${{ inputs.product }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            echo "product=all" >> "$GITHUB_OUTPUT"
          else
            echo "product=${INPUT_PRODUCT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Crawl docs
        env:
          PRODUCT: ${{ steps.product.outputs.product }}
          LIMIT: ${{ inputs.limit }}
        run: |
          set -euo pipefail

          args=(src/main.py crawl)
          if [[ "$PRODUCT" == "all" ]]; then
            args+=(--all)
          else
            if [[ ! "$PRODUCT" =~ ^[a-z0-9_-]+$ ]]; then
              echo "Invalid product: $PRODUCT" >&2
              exit 2
            fi
            args+=(-p "$PRODUCT")
          fi

          if [[ -n "${LIMIT:-}" ]]; then
            if [[ ! "$LIMIT" =~ ^[0-9]+$ ]]; then
              echo "Invalid limit: $LIMIT" >&2
              exit 2
            fi
            args+=(-l "$LIMIT")
          fi

          echo "PYTHONPATH=. python ${args[*]}"
          PYTHONPATH=. python "${args[@]}" 2>&1 | tee crawl.log

      - name: Validate docs
        run: PYTHONPATH=. python src/main.py validate

      - name: Upload crawl log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-log-${{ steps.product.outputs.product }}-${{ github.run_id }}
          path: crawl.log
          if-no-files-found: ignore

      - name: Commit updated docs
        if: ${{ github.event_name == 'schedule' || inputs.commit_changes }}
        env:
          PRODUCT: ${{ steps.product.outputs.product }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs index README.md
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "Update ${PRODUCT} API docs"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi
