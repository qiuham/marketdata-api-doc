name: Validate Docs

"on":
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall src

      - name: Generate indexes
        run: PYTHONPATH=. python src/main.py index --all

      - name: Refresh README
        run: PYTHONPATH=. python src/main.py readme

      - name: Validate docs
        run: PYTHONPATH=. python src/main.py validate

      - name: Check generated files are committed
        run: git diff --exit-code README.md index
